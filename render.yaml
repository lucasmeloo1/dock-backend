services:
  - type: web
    name: dock-app
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dock-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_TIMEZONE
        value: America/Sao_Paulo
      - key: AI_PROVIDER
        value: auto
      - key: CHAT_TIMEOUT_SECONDS
        value: "12"
      - key: AI_TIMEOUT_SECONDS
        value: "15"
      - key: LIVE_DATA_TIMEOUT_SECONDS
        value: "8"
      - key: DB_INIT_MAX_ATTEMPTS
        value: "20"
      - key: DB_INIT_RETRY_SECONDS
        value: "2"
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: dock-db
    plan: free
