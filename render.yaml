services:
  - type: web
    name: dock-app
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dock-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: AI_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: dock-db
    plan: free
